name: RootFS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y debootstrap qemu-user-static cpio

      - name: Build Ubuntu rootfs
        run: |
          bash rootfs/scripts/build_rootfs.sh

      - name: Upload rootfs
        uses: actions/upload-artifact@v3
        with:
          name: rootfs
          path: rootfs/initramfs.cpio.gz
