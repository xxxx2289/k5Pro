name: Build RootFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt install -y debootstrap qemu-user-static cpio

      - name: Build rootfs
        run: bash rootfs/scripts/build_rootfs.sh

      - name: Upload initramfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs
          path: rootfs/initramfs.cpio.gz
